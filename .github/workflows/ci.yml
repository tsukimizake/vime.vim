name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # 推奨の anthy-unicode を source からビルド。Ubuntu の libanthy-dev(原 anthy 9100h)は
      # dic_util シンボルが分離されていて register_word 系が CI で動かない上、ローカル
      # (nix の anthy-unicode/libanthy-unicode)と辞書差/分割差が出るので、ローカルと
      # 揃った dic 環境で回す。CLAUDE.md の macOS 手順に準拠(--sysconfdir は絶対パス必須)。
      - name: Install build deps for anthy-unicode
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential meson ninja-build pkg-config gettext

      - name: Build and install anthy-unicode
        run: |
          git clone --depth=1 https://github.com/fujiwarat/anthy-unicode /tmp/anthy-unicode
          cd /tmp/anthy-unicode
          meson setup build --prefix=$HOME/.local --sysconfdir=$HOME/.local/etc -Demacs=disabled
          meson compile -C build
          meson install -C build
          # build 後の lib 名を環境変数 VIME_ANTHY_LIB に固定し、config.find_anthy_lib()
          # の探索結果と一致させる。LD_LIBRARY_PATH も dlopen 用に通す。
          ls -la "$HOME/.local/lib" >&2
          lib=$(ls "$HOME/.local/lib"/libanthy-unicode.so 2>/dev/null \
                || ls "$HOME/.local/lib"/libanthy-utf.so 2>/dev/null \
                || ls "$HOME/.local/lib"/libanthy.so)
          echo "VIME_ANTHY_LIB=$lib" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$HOME/.local/lib:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"

      - name: Setup Neovim
        uses: rhysd/action-setup-vim@febef33995d6649302e9d88dda81e071b68f16a7 # v1.6.1
        with:
          neovim: true
          version: stable

      # minimal_init は stdpath('data')/lazy/plenary.nvim を runtimepath に足す。
      - name: Install plenary.nvim
        run: git clone --depth 1 https://github.com/nvim-lua/plenary.nvim "${HOME}/.local/share/nvim/lazy/plenary.nvim"

      - name: Run tests
        run: make test

  lint:
    name: lint (luacheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # luacheck の実行ランタイム。std=luajit は .luacheckrc の解析設定なのでランタイムは標準 Lua でよい。
      - uses: leafo/gh-actions-lua@6919171ccf181b826f44b9bca76307b577217377 # v13.0.0
        with:
          luaVersion: "5.4"

      - uses: leafo/gh-actions-luarocks@35d062def313a7699a0d513e996bcf4352f05389 # v6.1.0

      - name: Install luacheck
        run: luarocks install luacheck

      - name: Run luacheck
        run: luacheck lua tests

  format:
    name: format (stylua)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Check formatting
        uses: JohnnyMorganz/stylua-action@76fd70c03e6340ceaf673366712db9b20560b402 # v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check lua tests
